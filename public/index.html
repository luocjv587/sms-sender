<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="color-scheme" content="light" />
    <title>短信邮件转发器</title>
    <style>
      * {
        box-sizing: border-box;
      }

      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        padding: 24px;
        color: #111;
        background: #f5f5f7;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      main {
        width: min(100%, 520px);
        padding: 40px;
        border-radius: 28px;
        background: #fff;
        box-shadow: 0 18px 60px rgb(0 0 0 / 8%);
      }

      .status {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 7px 12px;
        border-radius: 999px;
        color: #fff;
        background: #111;
        font-size: 14px;
      }

      .dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: #fff;
      }

      h1 {
        margin: 24px 0 10px;
        font-size: clamp(30px, 7vw, 44px);
        letter-spacing: -0.04em;
      }

      p {
        margin: 0;
        color: #666;
        line-height: 1.7;
      }

      code {
        color: #111;
        font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      }
    </style>
  </head>
  <body>
    <main>
      <div class="status"><span class="dot"></span>服务已部署</div>
      <h1>短信邮件转发器</h1>
      <p>
        SMTP 转发 API 已就绪。请在 Android App 中将 API 地址配置为
        <code>https://当前域名/api/forward</code>。
      </p>
    </main>
  </body>
</html>
